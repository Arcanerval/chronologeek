<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Star Wars — Chronologeek</title>
<style>
:root{
  --bg:#08080f;--surface:#0f0f1a;--surface2:#161625;--border:#1e1e35;--border2:#2a2a48;
  --accent:#7c6af7;--accent2:#f06292;--gold:#f5c842;--text:#e2e2f0;--muted:#686880;
  --muted2:#9090b0;--green:#56c27a;--orange:#f09642;--red:#e05555;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(124,106,247,.12),transparent 60%),radial-gradient(ellipse 60% 50% at 80% 110%,rgba(240,98,146,.08),transparent 60%);pointer-events:none}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
header{background:rgba(8,8,15,.88);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:200;backdrop-filter:blur(20px)}
nav{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;height:62px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:.6rem;cursor:pointer;flex-shrink:0}
.logo img{height:36px;display:none}.logo img.loaded{display:block}
.logo-text{font-size:1.35rem;font-weight:900;letter-spacing:-.5px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-links{display:flex;gap:1.25rem;align-items:center}
.nav-links a{color:var(--muted2);font-size:.88rem;text-decoration:none;cursor:pointer;transition:color .2s;white-space:nowrap}
.nav-links a:hover{color:var(--text)}
.nav-sp{flex:1}
.pbn{display:none;align-items:center;gap:.6rem;font-size:.78rem;color:var(--muted2)}.pbn.show{display:flex}
.pbn-track{width:100px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.pbn-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s}
.disc-btn{background:linear-gradient(135deg,#5865f2,#4752c4);color:#fff!important;padding:.4rem 1rem;border-radius:8px;font-size:.82rem;font-weight:600;white-space:nowrap}
/* HOME */
#home-page{display:none}#home-page.v{display:block}
.hero{padding:5rem 2rem 4rem;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 80% at 50% 0%,rgba(124,106,247,.15),transparent 70%);pointer-events:none}
.hero-inner{position:relative;z-index:1}
.hero h1{font-size:clamp(2.8rem,7vw,5rem);font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,#fff 0%,var(--accent) 45%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:1.25rem;line-height:1}
.hero-rune{font-size:.72rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);margin-bottom:1rem}
.hero-tagline{color:var(--muted2);font-size:1.05rem;max-width:540px;margin:0 auto 3.5rem;line-height:1.65}
.ugrid{display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap;max-width:960px;margin:0 auto}
.ucard{background:linear-gradient(160deg,var(--surface),var(--surface2));border:1px solid var(--border2);border-radius:18px;cursor:pointer;transition:all .3s cubic-bezier(.34,1.56,.64,1);width:240px;overflow:hidden}
.ucard:hover{transform:translateY(-6px) scale(1.02);box-shadow:0 20px 60px rgba(124,106,247,.25),0 0 0 1px rgba(124,106,247,.3)}
.cbanner{height:130px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;overflow:hidden}
.cbanner img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.55}
.cbanner::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 30%,var(--surface) 100%);pointer-events:none}
.cicon{position:relative;z-index:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.9))}
.cbody{padding:1.1rem 1.25rem 1.25rem}
.cname{font-weight:800;font-size:1.05rem;margin-bottom:.3rem}
.csub{font-size:.78rem;color:var(--muted2);line-height:1.4}
.cprogress{margin-top:.75rem;display:flex;align-items:center;gap:.6rem;font-size:.72rem;color:var(--muted2)}
.cp-track{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.cp-fill{height:100%;border-radius:2px;transition:width .5s}
.cnew{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:6px;margin-top:.6rem}
/* TIMELINE PAGE */
.tl-page{display:block;max-width:1200px;margin:0 auto;padding:2.5rem 2rem}
.bc{font-size:.78rem;color:var(--muted2);margin-bottom:1.25rem;cursor:pointer;display:inline-flex;align-items:center;gap:.4rem;transition:color .2s}
.bc:hover{color:var(--accent)}
.page-title{font-size:2.1rem;font-weight:900;letter-spacing:-.5px;margin-bottom:.4rem}
.page-sub{color:var(--muted2);font-size:.9rem;line-height:1.55;margin-bottom:1.5rem}
.progress-block{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.25rem}
.pb-info{flex:1}.pb-label{font-size:.72rem;color:var(--muted2);margin-bottom:.4rem;text-transform:uppercase;letter-spacing:.06em}
.pb-track{height:6px;background:var(--border2);border-radius:3px;overflow:hidden;margin-bottom:.35rem}
.pb-fill{height:100%;border-radius:3px;transition:width .5s}
.pb-counts{font-size:.78rem;color:var(--muted2)}.pb-counts strong{color:var(--text)}
.pb-reset{background:transparent;border:1px solid var(--border2);color:var(--muted2);padding:.35rem .8rem;border-radius:8px;font-size:.75rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.pb-reset:hover{border-color:var(--red);color:var(--red)}
.nb{background:linear-gradient(135deg,rgba(124,106,247,.08),rgba(240,98,146,.05));border:1px solid rgba(124,106,247,.2);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;padding:1.1rem 1.3rem;margin-bottom:1.5rem;font-size:.86rem;line-height:1.75;color:var(--muted2)}
.nb strong{color:var(--text)}
.leg{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:1rem 1.25rem;margin-bottom:1.5rem;display:flex;flex-wrap:wrap;gap:.5rem .9rem;align-items:center;font-size:.82rem}
.leg-title{width:100%;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.1rem}
/* BADGES */
.b{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:.69rem;font-weight:700;white-space:nowrap}
.bf{background:rgba(100,181,246,.12);color:#64b5f6;border:1px solid rgba(100,181,246,.25)}
.bfa{background:rgba(144,202,249,.10);color:#90caf9;border:1px solid rgba(144,202,249,.2)}
.bs{background:rgba(129,199,132,.12);color:#81c784;border:1px solid rgba(129,199,132,.25)}
.ba{background:rgba(206,147,216,.12);color:#ce93d8;border:1px solid rgba(206,147,216,.25)}
.bj{background:rgba(255,183,77,.12);color:#ffb74d;border:1px solid rgba(255,183,77,.25)}
.bsp{background:rgba(255,167,38,.12);color:#ffa726;border:1px solid rgba(255,167,38,.25)}
.bv{background:rgba(239,83,80,.12);color:#ef5350;border:1px solid rgba(239,83,80,.25)}
.nt{display:inline-flex;font-size:.65rem;padding:2px 7px;border-radius:5px;font-weight:700;white-space:nowrap;background:rgba(224,85,85,.12);color:var(--red);border:1px solid rgba(224,85,85,.25)}
.ft{display:inline-flex;font-size:.65rem;padding:2px 7px;border-radius:5px;white-space:nowrap;background:rgba(240,150,66,.12);color:var(--orange);border:1px solid rgba(240,150,66,.25)}
.dt{display:inline-flex;font-size:.65rem;padding:2px 7px;border-radius:5px;white-space:nowrap;background:rgba(124,106,247,.12);color:#a99fff;border:1px solid rgba(124,106,247,.25)}
/* FILTRES */
.filter-bar{display:flex;flex-direction:column;gap:.6rem;margin-bottom:2rem}
.filter-group{display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
.filter-label{font-size:.72rem;color:var(--muted2);text-transform:uppercase;letter-spacing:.06em;font-weight:600;white-space:nowrap;min-width:56px}
.fbt{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2);padding:.35rem .85rem;border-radius:20px;cursor:pointer;font-size:.79rem;transition:all .2s;user-select:none}
.fbt:hover{border-color:var(--accent);color:var(--text)}
.fbt.active{background:rgba(124,106,247,.2);border-color:var(--accent);color:#c4baff;font-weight:600}
/* ERA */
.era-node{display:flex;align-items:flex-start;margin:2.5rem 0 .6rem;position:relative}
.era-node-dot{width:12px;height:12px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:3px;z-index:2;margin-right:10px}
.era-node-dot.sv{background:#90caf9}.era-node-dot.fox{background:#ffb74d}
.era-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);line-height:1.3}
.era-label.sv{color:#90caf9}.era-label.fox{color:#ffb74d}
/* SEGMENTS */
.segment-box{margin:.4rem 0 1rem;border:1px solid var(--border2);border-radius:14px;overflow:hidden;background:linear-gradient(160deg,var(--surface),var(--surface2));margin-left:40px}
.segment-header{padding:.7rem 1rem;display:flex;align-items:center;gap:.6rem;border-bottom:1px solid var(--border2)}
.segment-header.sv{background:linear-gradient(135deg,rgba(144,202,249,.08),rgba(206,147,216,.05))}
.segment-header.fox{background:linear-gradient(135deg,rgba(255,183,77,.08),rgba(224,85,85,.05))}
.segment-icon{font-size:1.2rem}.segment-title{font-weight:800;font-size:.88rem}
.segment-header.sv .segment-title{color:#90caf9}.segment-header.fox .segment-title{color:#ffb74d}
.segment-sub{font-size:.72rem;color:var(--muted2);margin-left:auto}.segment-body{padding:.5rem .65rem}
/* ENTRY */
.en{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:.5rem;display:flex;flex-direction:column;overflow:hidden;transition:border-color .2s,background .2s,box-shadow .2s;cursor:pointer}
.en:hover{border-color:var(--border2);background:var(--surface2);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.en.must{border-left:3px solid var(--gold)}.en.imp{border-left:3px solid var(--orange)}
.en.done{opacity:.5}.en.done .en-name{text-decoration:line-through;text-decoration-color:var(--muted)}
.en.open{border-color:var(--accent);box-shadow:0 0 0 1px rgba(124,106,247,.2),0 8px 30px rgba(0,0,0,.4)}
/* Décalage droite pour les non-616 — amplifié */
.en.deviate{margin-left:40px;border-left-style:dashed}
.en-top{display:flex;overflow:hidden;min-height:86px}
.en-check{width:40px;min-width:40px;display:flex;align-items:center;justify-content:center;border-right:1px solid var(--border);flex-shrink:0;transition:background .2s;cursor:pointer}
.en-check:hover{background:rgba(124,106,247,.08)}
.checkmark{width:20px;height:20px;border-radius:6px;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:.75rem;color:#fff;font-weight:700}
.en-check:hover .checkmark{border-color:var(--accent)}
.en.done .checkmark{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:transparent}
/* Date badge — grande */
.en-datebadge{width:100px;min-width:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;border-right:1px solid var(--border);flex-shrink:0;padding:.4rem .35rem;background:rgba(124,106,247,.04);gap:.12rem}
.en-level-icon{font-size:1rem;line-height:1;min-height:1rem}
.date-main{font-size:.82rem;font-weight:900;color:var(--text);text-align:center;line-height:1.2}
.dim-badge{font-size:.52rem;font-weight:700;color:#a99fff;background:rgba(124,106,247,.15);border:1px solid rgba(124,106,247,.25);border-radius:4px;padding:1px 4px;text-align:center;line-height:1.4;margin-top:.1rem;max-width:92px;word-break:break-word}
.ep{width:200px;min-width:200px;background:var(--surface2);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;border-right:1px solid var(--border);cursor:pointer}
.ep img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block;transition:transform .3s}
.ep:hover img{transform:scale(1.06)}.pp{font-size:1.5rem;opacity:.15}
.em{flex:1;padding:.7rem .9rem;min-width:0;display:flex;flex-direction:column;gap:.18rem}
.tr{display:flex;flex-wrap:wrap;gap:.3rem;align-items:center}
.en-name{font-weight:600;font-size:.92rem;line-height:1.3;color:var(--text)}
.enote{font-size:.78rem;color:var(--muted2);font-style:italic;line-height:1.5}
.edetails{font-size:.78rem;color:var(--muted2);line-height:1.5;padding:.25rem .5rem;border-left:2px solid var(--border2);background:rgba(124,106,247,.03);border-radius:0 4px 4px 0;margin-top:.1rem}
.esub{padding-left:.5rem;border-left:2px solid var(--border2);margin-top:.25rem}
.si{font-size:.76rem;color:var(--muted2);padding:.07rem 0 .07rem .45rem;line-height:1.4}
.si strong{color:var(--muted2)}
/* EXPAND */
.en-expand{display:none;border-top:1px solid var(--border);background:rgba(0,0,0,.25)}
.en.open .en-expand{display:block}
.expand-inner{display:flex;min-height:150px}
.expand-poster{width:100px;min-width:100px;flex-shrink:0;cursor:pointer;overflow:hidden;position:relative}
.expand-poster img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.expand-poster:hover img{transform:scale(1.04)}
.expand-poster-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0);transition:background .2s;font-size:1.6rem;opacity:0}
.expand-poster:hover .expand-poster-ov{background:rgba(0,0,0,.45);opacity:1}
.expand-info{flex:1;padding:.85rem 1rem;display:flex;flex-direction:column;gap:.45rem;overflow:hidden}
.expand-synopsis{font-size:.8rem;color:var(--muted2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;overflow:hidden}
.expand-meta{display:flex;flex-wrap:wrap;gap:.25rem .6rem;font-size:.74rem;color:var(--muted2)}
.expand-meta span strong{color:var(--text)}
.expand-trailer-link{display:inline-flex;align-items:center;gap:.4rem;background:rgba(255,0,0,.1);border:1px solid rgba(255,0,0,.25);color:#ff6b6b;padding:.28rem .7rem;border-radius:8px;font-size:.77rem;font-weight:600;text-decoration:none;transition:all .2s;width:fit-content}
.expand-trailer-link:hover{background:rgba(255,0,0,.2)}
.expand-loading{padding:1.5rem;color:var(--muted);font-size:.8rem;text-align:center}
.expand-no-data{padding:1rem;color:var(--muted);font-size:.8rem}
/* MODAL */
.pm{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.92);align-items:center;justify-content:center;backdrop-filter:blur(8px);cursor:pointer}
.pm.o{display:flex}.pm img{max-height:88vh;max-width:88vw;border-radius:14px;box-shadow:0 30px 100px rgba(0,0,0,.9)}
.pm-x{position:absolute;top:1.25rem;right:1.75rem;color:#fff;font-size:1.8rem;cursor:pointer;opacity:.6}
/* CS */
.cs{display:none;text-align:center;padding:6rem 2rem;color:var(--muted2)}.cs.v{display:block}
.cs h2{font-size:2rem;margin-bottom:1rem;color:var(--text)}
@media(max-width:700px){
  .tl-page{padding:1rem .6rem;max-width:100%}
  .en-top{flex-direction:column;min-height:unset}
  .ep{width:100%!important;min-width:unset!important;height:120px;border-right:none;border-bottom:1px solid var(--border)}
  .ep img{object-position:center 25%}
  .en-check{width:100%;height:34px;border-right:none;border-bottom:1px solid var(--border);justify-content:flex-start;padding-left:1rem}
  .en-datebadge{width:100%!important;min-width:unset!important;flex-direction:row;gap:.6rem;justify-content:flex-start;border-right:none;border-bottom:1px solid var(--border);padding:.3rem .75rem;background:rgba(124,106,247,.05)}
  .en-level-icon{min-height:unset}
  .dim-badge{max-width:none;font-size:.6rem}
  .em{padding:.6rem .75rem}
  .en-name{font-size:.88rem}
  .enote{font-size:.75rem}
  .b{font-size:.64rem;padding:2px 6px}
  .nt,.ft,.dt{font-size:.62rem;padding:2px 5px}
  .expand-poster{width:80px;min-width:80px}
  nav{gap:.5rem;height:auto;padding:.5rem 0;flex-wrap:wrap}
  .nav-links{gap:.7rem}
  .nav-links a{font-size:.78rem}
  .disc-btn{padding:.3rem .7rem;font-size:.78rem}
  .en.deviate{margin-left:10px}
  .segment-box{margin-left:10px}
  #miss-minute{width:64px;height:64px;bottom:1.25rem;right:1.25rem}
  .filter-group{gap:.35rem}
  .fbt{font-size:.73rem;padding:.28rem .65rem}
  .progress-block{flex-direction:column;align-items:flex-start;gap:.75rem}
}
@media(max-width:420px){
  .ep{height:90px}
  .en-name{font-size:.82rem}
}
@media(max-width:420px){
  .ep{width:60px;min-width:60px}
  .en-check{width:28px;min-width:28px}
  .en-name{font-size:.79rem}
  .date-main{font-size:.63rem}
}

.expand-faq{padding:.75rem 1rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:.35rem}
.faq-item{border:1px solid var(--border2);border-radius:8px;overflow:hidden;background:var(--surface)}
.faq-q{padding:.5rem .85rem;font-size:.82rem;font-weight:600;color:var(--accent);cursor:pointer;list-style:none;display:flex;align-items:center;justify-content:space-between;user-select:none}
.faq-q::-webkit-details-marker{display:none}
.faq-q::after{content:'›';font-size:1.2rem;transition:transform .2s;color:var(--muted2)}
details[open] .faq-q::after{transform:rotate(90deg)}
.faq-a{padding:.5rem .85rem .65rem;font-size:.81rem;color:var(--muted2);line-height:1.65;border-top:1px solid var(--border)}

#grogu{position:fixed;bottom:2rem;right:2rem;z-index:300;width:88px;height:88px;cursor:pointer;transition:transform .3s cubic-bezier(.34,1.56,.64,1);filter:drop-shadow(0 4px 16px rgba(0,0,0,.6));display:none}
#grogu.visible{display:block}
#grogu img{width:100%;height:100%;object-fit:contain}
#grogu:hover{transform:scale(1.15) rotate(8deg)}
.grogu-normal{display:block}.grogu-hover{display:none}
#grogu:hover .grogu-normal{display:none}
#grogu:hover .grogu-hover{display:block}
</style>
</head>
<body>
<header>
  <nav>
    <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">
      <img id="site-logo" alt="Chronologeek" onload="this.classList.add('loaded');document.getElementById('logo-text').style.display='none'"/>
      <span class="logo-text" id="logo-text">Chronologeek</span>
    </div>
    <div class="nav-links">
      <a onclick="window.location.href='index.html'">Accueil</a>
      <a onclick="window.location.href='starwars.html'" style="color:var(--text);font-weight:700">Star Wars</a>
      <a onclick="window.location.href='marvel.html'">Marvel</a>
      <a href="#">Dossiers</a>
      <a href="#">Communauté</a>
    </div>
    <div class="nav-sp"></div>
    <div class="pbn" id="pbn"><span id="pbn-label">0/0</span><div class="pbn-track"><div class="pbn-fill" id="pbn-fill" style="width:0%"></div></div></div>
    <a href="#" class="disc-btn">Discord</a>
  </nav>
</header>
<div id="grogu" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Remonter en haut">
  <img class="grogu-normal" src="images/grogu.png" alt="Grogu"/>
  <img class="grogu-hover" src="images/grogumouseover.png" alt="Grogu"/>
</div>
<div class="pm" id="pm" onclick="closePM()"><span class="pm-x">✕</span><img id="pmi" src="" alt=""/></div>
<div class="tl-page" id="tl-page">
  <div class="bc" onclick="window.location.href='index.html'">← Accueil</div>
  <div class="page-title" id="tl-title"></div>
  <div class="page-sub" id="tl-sub"></div>
  <div class="progress-block">
    <div class="pb-info">
      <div class="pb-label">Ma progression</div>
      <div class="pb-track"><div class="pb-fill" id="pb-fill" style="width:0%"></div></div>
      <div class="pb-counts" id="pb-counts">0 / 0 · 0%</div>
      <div class="pb-hint">Vous pouvez cocher votre progression qui sera sauvegardée sur ce navigateur</div>
    </div>
    <button class="pb-reset" onclick="resetProgress()">Reset</button>
  </div>
  <div class="nb" id="tl-notes"></div>
  <div class="leg" id="tl-legend"></div>
  <div class="filter-bar" id="filter-bar"></div>
  <div id="tl-content"></div>
</div>

      {id:"sw-skelcrew",type:"serie",tmdb:"247317",media:"tv",img:"images/skeletoncrew.webp",title:"Skeleton Crew",date:"~9 ABY",faq:{quand:"La série se déroule probablement au même moment que les autres de cette période en 9 ABY",pourquoi:"Parce qu'elle se situe ici chronologiquement"}}

      {id:"sw-bf2-m12",type:"jeu",tmdb:"0",media:"game",img:"images/battlefront.png",title:"Star Wars Battlefront II Campagne : Mission 12",date:"~34 ABY",tags:["flashback"],faq:{quand:"La mission se déroule peu de temps avant l'Épisode VII",pourquoi:"Parce qu'il vaut mieux découvrir d'abord les personnages dans le film"}},
      {id:"sw-bf2res",type:"jeu",tmdb:"0",media:"game",img:"images/battlefront.png",title:"Star Wars Battlefront II Campagne : Résurrection",date:"34 ABY",faq:{quand:"Les 3 missions se déroulent avant, pendant et après Le Réveil de la Force",pourquoi:"Parce que c'est un bon compagnon au film précédent et une bonne introduction au film suivant"}},
      {id:"sw-ep8",type:"film",tmdb:"181808",media:"movie",img:"images/starwars8.webp",title:"Épisode VIII : Les Derniers Jedi",date:"34 ABY",faq:{quand:"Le film se passe juste après les évènements de l'Épisode VII en 34 ABY",pourquoi:"Parce qu'il se situe ici chronologiquement"}},
      {id:"sw-ep9",type:"film",tmdb:"181812",media:"movie",img:"images/starwars9.webp",title:"Épisode IX : L'Ascension de Skywalker",date:"35 ABY",faq:{quand:"Le film se passe un an après Les Derniers Jedi",pourquoi:"Parce qu'il se situe ici chronologiquement"}}

const UNIVERSES=[{data:DATA_SW,icon:'⚔️'}];
const TMDB_KEY='6257b37bf29ab31357853fce00232314';
const IMG='https://image.tmdb.org/t/p/';
const BADGES={
  film:['bf','FILM'],filmanim:['bfa','FILM ANIMÉ'],
  serie:['bs','SÉRIE'],anime:['ba','SÉRIE ANIMÉE'],
  jeu:['bj','JEU VIDÉO']
};
const BADGE_LABELS={film:'Films',filmanim:'Films animés',serie:'Séries',anime:'Séries animées',jeu:'Jeux'};
let currentData=null;
const posterCache={},detailCache={};

function getProgress(uid){try{return JSON.parse(localStorage.getItem('cg_'+uid)||'{}')}catch{return{}}}
function saveProgress(uid,obj){localStorage.setItem('cg_'+uid,JSON.stringify(obj))}
function toggleEntry(id,ev){
  ev.stopPropagation();
  if(!currentData)return;
  const prog=getProgress(currentData.id);
  prog[id]?delete prog[id]:(prog[id]=1);
  saveProgress(currentData.id,prog);
  renderProgress();
}
function resetProgress(){
  if(!currentData||!confirm('Réinitialiser ta progression ?'))return;
  localStorage.removeItem('cg_'+currentData.id);
  renderProgress();
}
function renderProgress(){
  if(!currentData)return;
  const prog=getProgress(currentData.id);
  let total=0,done=0;
  currentData.eras.forEach(era=>era.entries.forEach(e=>{
    total++;
    const el=document.querySelector('.en[data-id="'+e.id+'"]');
    if(!el)return;
    const checked=!!prog[e.id];
    el.classList.toggle('done',checked);
    el.querySelector('.checkmark').textContent=checked?'✓':'';
    if(checked)done++;
  }));
  const pct=total?Math.round(done/total*100):0;
  const grad='linear-gradient(90deg,var(--accent),var(--accent2))';
  document.getElementById('pb-fill').style.cssText='width:'+pct+'%;background:'+grad;
  document.getElementById('pb-counts').innerHTML='<strong>'+done+'</strong> / '+total+' vus · <strong>'+pct+'%</strong>';
  const pbn=document.getElementById('pbn');
  if(pbn){
    pbn.classList.toggle('show',total>0);
    document.getElementById('pbn-label').textContent=done+'/'+total;
    document.getElementById('pbn-fill').style.cssText='width:'+pct+'%;background:'+grad;
  }
}

async function fetchBackdrop(id,type){
  if(!id||id==='0')return null;
  const k=type+'-'+id;
  if(posterCache[k]!==undefined)return posterCache[k];
  try{
    const r=await fetch('https://api.themoviedb.org/3/'+type+'/'+id+'?api_key='+TMDB_KEY);
    if(!r.ok){posterCache[k]=null;return null}
    const d=await r.json();
    posterCache[k]=d.backdrop_path||null;
    return posterCache[k];
  }catch{posterCache[k]=null;return null}
}
function applyImg(div,path){
  if(div.querySelector('img'))return;
  const img=document.createElement('img');
  img.src=path;img.loading='lazy';
  img.onerror=()=>img.remove();
  div.querySelector('.pp').style.display='none';
  div.appendChild(img);
}
async function loadPosters(){
  // Images locales en priorité
  document.querySelectorAll('#tl-content .ep[data-img]').forEach(ep=>{
    if(ep.querySelector('img'))return;
    applyImg(ep,ep.dataset.img);
  });
  // TMDB backdrop pour les entrées sans image locale
  const entries=[...document.querySelectorAll('#tl-content .en[data-tmdb]:not([data-tmdb="0"])')];
  const seen=new Set();
  for(let i=0;i<entries.length;i+=5){
    await Promise.all(entries.slice(i,i+5).map(async e=>{
      if(e.querySelector('.ep[data-img]'))return;
      const id=e.dataset.tmdb,media=e.dataset.media==='movie'?'movie':'tv';
      const k=media+'-'+id;
      if(seen.has(k))return;
      seen.add(k);
      const path=await fetchBackdrop(id,media);
      if(path)applyImg(e.querySelector('.ep'),IMG+'w500'+path);
    }));
    await new Promise(r=>setTimeout(r,100));
  }
}

async function toggleExpand(el,ev){
  if(ev.target.closest('.en-check'))return;
  const wasOpen=el.classList.contains('open');
  document.querySelectorAll('.en.open').forEach(x=>x.classList.remove('open'));
  if(wasOpen)return;
  el.classList.add('open');
  const panel=el.querySelector('.en-expand');
  if(panel.dataset.loaded)return;
  panel.dataset.loaded='1';

  // FAQ depuis les données
  const entryObj=currentData&&currentData.eras.flatMap(e=>e.entries).find(e=>e.id===el.dataset.id);
  const faqDef=entryObj&&entryObj.faq||{};
  const mediaName=entryObj?entryObj.title:'ce média';
  const faqCats=[
    {key:'quand',q:'Quand se déroule '+mediaName+' dans l\'univers Star Wars ?',fallback:'Information non disponible.'},
    {key:'pourquoi',q:'Pourquoi regarder '+mediaName+' maintenant dans la timeline ?',fallback:'Information non disponible.'}
  ];
  const faqHtml=faqCats.map(cat=>'<details class="faq-item"><summary class="faq-q">'+cat.q+'</summary><div class="faq-a">'+(faqDef[cat.key]||cat.fallback)+'</div></details>').join('');

  const id=el.dataset.tmdb,media=el.dataset.media;
  if(!id||id==='0'){
    panel.innerHTML='<div class="expand-no-data">'+(faqHtml?'<div class="expand-faq">'+faqHtml+'</div>':'Pas d\'informations TMDB pour cette entrée.')+'</div>';
    return;
  }
  panel.innerHTML='<div class="expand-loading">Chargement…</div>';
  const type=(media==='movie')?'movie':'tv';
  const k=type+id;
  let d=detailCache[k];
  if(!d){
    try{
      const rFr=await fetch('https://api.themoviedb.org/3/'+type+'/'+id+'?api_key='+TMDB_KEY+'&language=fr-FR&append_to_response=videos');
      d=await rFr.json();
      if(!d.videos||!d.videos.results||!d.videos.results.find(v=>v.type==='Trailer'&&v.site==='YouTube')){
        const rEn=await fetch('https://api.themoviedb.org/3/'+type+'/'+id+'/videos?api_key='+TMDB_KEY+'&language=en-US');
        const enV=await rEn.json();
        if(enV.results)d.videos={results:[...((d.videos&&d.videos.results)||[]),...enV.results]};
      }
      detailCache[k]=d;
    }catch{panel.innerHTML='<div class="expand-loading">Erreur de chargement.</div>';return}
  }
  const synopsis=d.overview||'Pas de synopsis disponible.';
  const runtime=d.runtime?(d.runtime+' min'):(d.episode_run_time&&d.episode_run_time[0]?(d.episode_run_time[0]+' min/ép'):null);
  const genres=(d.genres||[]).map(g=>g.name).join(', ')||null;
  const year=(d.release_date||d.first_air_date||'').substring(0,4)||null;
  const rating=d.vote_average?d.vote_average.toFixed(1):null;
  const poster=d.poster_path?IMG+'w300'+d.poster_path:null;
  const trailer=(d.videos&&d.videos.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube');
  const ytUrl=trailer?'https://www.youtube.com/watch?v='+trailer.key:null;
  let meta='';
  if(year)meta+='<span><strong>Année</strong> '+year+'</span>';
  if(runtime)meta+='<span><strong>Durée</strong> '+runtime+'</span>';
  if(genres)meta+='<span><strong>Genre</strong> '+genres+'</span>';
  if(rating)meta+='<span><strong>Note</strong> ⭐ '+rating+'/10</span>';
  panel.innerHTML='<div class="expand-inner">'
    +(poster?'<div class="expand-poster" onclick="openPMurl(\''+IMG+'w500'+d.poster_path+'\')"><img src="'+poster+'" loading="lazy"/><div class="expand-poster-ov">🔍</div></div>':'')
    +'<div class="expand-info"><div class="expand-synopsis">'+synopsis+'</div>'
    +(meta?'<div class="expand-meta">'+meta+'</div>':'')
    +(ytUrl?'<a class="expand-trailer-link" href="'+ytUrl+'" target="_blank" rel="noopener">▶ Bande-annonce YouTube</a>':'')
    +'</div></div>'
    +(faqHtml?'<div class="expand-faq">'+faqHtml+'</div>':'');
}
function openPMurl(url){document.getElementById('pmi').src=url;document.getElementById('pm').classList.add('o')}
function closePM(){document.getElementById('pm').classList.remove('o')}

function buildEntry(e){
  const [cls,label]=BADGES[e.type]||['bsp','?'];
  const prog=getProgress(currentData.id);
  const isDone=!!prog[e.id];
  const isGame=e.media==='game';
  const mediaAttr=isGame?'game':(e.media==='movie'?'movie':'tv');
  const imgAttr=e.img?' data-img="'+e.img+'"':'';
  const isNC=e.tags&&e.tags.includes('nc');
  const devClass=e.dim?' deviate':'';
  const ncClass=isNC?' nc-entry':'';
  let pre='';
  if(e.tags&&e.tags.includes('flashback'))pre+='<span class="ft">FLASHBACK</span>';
  const dimBadge=e.dim?'<div class="dim-badge">'+e.dim+'</div>':'';
  const ppIcon=isGame?'🎮':e.type==='film'||e.type==='filmanim'?'🎬':'📺';
  let sub='';
  if(e.subitems&&e.subitems.length)sub='<div class="esub">'+e.subitems.map(s=>'<div class="si">'+s+'</div>').join('')+'</div>';
  const note=e.note?'<div class="enote">'+e.note+'</div>':'';
  return '<div class="en'+devClass+ncClass+(isDone?' done':'')+'" data-id="'+e.id+'" data-type="'+e.type+'" data-tmdb="'+(e.tmdb||'0')+'" data-media="'+mediaAttr+'" onclick="toggleExpand(this,event)">'
    +'<div class="en-top" onclick="toggleExpand(this.closest(\'.en\'),event)">'
    +'<div class="en-check" onclick="toggleEntry(\''+e.id+'\',event)"><div class="checkmark">'+(isDone?'✓':'')+'</div></div>'
    +'<div class="en-datebadge"><div class="date-main">'+(e.date||'—')+'</div>'+dimBadge+'</div>'
    +'<div class="ep"'+imgAttr+'><div class="pp">'+ppIcon+'</div></div>'
    +'<div class="em"><div class="tr">'+pre+'<span class="b '+cls+'">'+label+'</span><span class="en-name">'+e.title+'</span></div>'+note+sub+'</div>'
    +'</div>'
    +'<div class="en-expand" onclick="event.stopPropagation()"></div></div>';
}

function buildTimeline(data){
  document.documentElement.style.setProperty('--tl-color',data.color||'var(--accent)');
  const types=[...new Set(data.eras.flatMap(era=>era.entries.map(e=>e.type)))];
  const hasFB=data.eras.some(era=>era.entries.some(e=>e.tags&&e.tags.includes('flashback')));

  let leg='<div class="leg-title">Légende</div>';
  types.forEach(t=>{const[c,l]=BADGES[t]||[];if(c)leg+='<span class="b '+c+'">'+l+'</span>';});
  if(hasFB)leg+='<span class="ft">FLASHBACK</span>';
  document.getElementById('tl-legend').innerHTML=leg;

  // Filtres par type seulement (pas de niveaux pour SW)
  let f='<div class="filter-group"><span class="filter-label">Types :</span>';
  types.forEach(t=>{
    const[,l]=BADGES[t]||['','?'];
    f+='<button class="fbt type-filter-btn active" data-type="'+t+'" onclick="toggleTypeFilter(this)">'+l+'</button>';
  });
  f+='</div>';
  document.getElementById('filter-bar').innerHTML=f;

  let html='';
  data.eras.forEach(era=>{
    html+='<div class="era-node" data-era><div class="era-node-dot"></div><div class="era-label">'+era.title+'</div></div>';
    era.entries.forEach(e=>{html+=buildEntry(e);});
  });
  document.getElementById('tl-content').innerHTML=html;
}

function applyFilters(){
  const showTypes=new Set();
  document.querySelectorAll('.type-filter-btn.active').forEach(b=>showTypes.add(b.dataset.type));
  document.querySelectorAll('#tl-content .en').forEach(e=>{
    const ok=showTypes.size===0||showTypes.has(e.dataset.type);
    e.style.display=ok?'':'none';
  });
  document.querySelectorAll('#tl-content .era-node').forEach(h=>{
    let n=h.nextElementSibling,vis=false;
    while(n&&!n.dataset.era){
      if(n.classList.contains('en')&&n.style.display!=='none')vis=true;
      n=n.nextElementSibling;
    }
    h.style.display=vis?'':'none';
  });
}
function toggleTypeFilter(btn){
  btn.classList.toggle('active');
  applyFilters();
}
function showHome(){window.location.href='index.html';}
function showUniverse(uid){
  const u=UNIVERSES.find(x=>x.data&&x.data.id===uid);
  if(!u)return;
  currentData=u.data;
  document.getElementById('tl-title').textContent=currentData.title+' — '+currentData.subtitle;
  document.getElementById('tl-title').style.color=currentData.color||'var(--text)';
  document.getElementById('tl-title').style.textShadow='0 0 40px '+(currentData.glow||'transparent');
  document.getElementById('tl-sub').textContent=currentData.description||'';
  document.getElementById('tl-notes').innerHTML=currentData.notes||'';
  document.getElementById('pb-fill').style.background='linear-gradient(90deg,'+(currentData.color||'var(--accent)')+',var(--accent2))';
  buildTimeline(currentData);renderProgress();
  window.scrollTo(0,0);loadPosters();
}
showUniverse('sw');


window.addEventListener('scroll',()=>{
  const g=document.getElementById('grogu');
  if(g)g.classList.toggle('visible',window.scrollY>400);
});
