<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DC Multivers — Chronologeek</title>
<style>
:root{
  --bg:#08080f;--surface:#0f0f1a;--surface2:#161625;--border:#1e1e35;--border2:#2a2a48;
  --accent:#7c6af7;--accent2:#f06292;--text:#e2e2f0;--muted:#686880;--muted2:#9090b0;
  --radius:10px;
  --c-else:#c084fc;--c-av:#22c55e;--c-dceu:#3b82f6;--c-dcu:#f97316;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 80% 60% at 20% -10%,rgba(124,106,247,.1),transparent 60%);pointer-events:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* NAV */
header{background:rgba(8,8,15,.92);border-bottom:1px solid var(--border);padding:0 2rem;position:sticky;top:0;z-index:300;backdrop-filter:blur(20px)}
nav{max-width:100%;display:flex;align-items:center;gap:1.5rem;height:62px}
.logo{display:flex;align-items:center;cursor:pointer;flex-shrink:0}
.logo img{height:28px;display:block;object-fit:contain}
.nav-links{display:flex;gap:1.25rem;align-items:center}
.nav-links a{color:var(--muted2);font-size:.88rem;text-decoration:none;cursor:pointer;transition:color .2s;white-space:nowrap}
.nav-links a:hover{color:var(--text)}
.nav-sp{flex:1}
.nav-maj{font-size:.7rem;color:var(--muted);white-space:nowrap}
.disc-btn{background:linear-gradient(135deg,#5865f2,#4752c4);color:#fff!important;padding:.4rem 1rem;border-radius:8px;font-size:.82rem;font-weight:600;white-space:nowrap;text-decoration:none}
.pbn{display:none;align-items:center;gap:.6rem;font-size:.78rem;color:var(--muted2)}
.pbn.show{display:flex}
.pbn-track{width:80px;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.pbn-fill{height:100%;border-radius:2px;transition:width .4s}

/* HEADER PAGE */
.page-header{padding:1.5rem 2rem 1rem;max-width:100%}
.bc{font-size:.8rem;color:var(--muted);cursor:pointer;margin-bottom:.8rem;display:inline-flex;align-items:center;gap:.4rem}
.bc:hover{color:var(--text)}
.page-title{font-size:1.8rem;font-weight:900;letter-spacing:-.5px;color:#1e90ff;text-shadow:0 0 40px rgba(30,144,255,.3);margin-bottom:.2rem}
.page-sub{font-size:.85rem;color:var(--muted2);margin-bottom:1rem}
.progress-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1.2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:1rem}
.pb-info{flex:1}
.pb-label{font-size:.68rem;color:var(--muted);margin-bottom:.2rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.pb-track{height:4px;background:var(--border2);border-radius:3px;overflow:hidden;margin:.25rem 0}
.pb-fill{height:100%;border-radius:3px;transition:width .4s;background:linear-gradient(90deg,#1e90ff,var(--accent2))}
.pb-counts{font-size:.78rem;color:var(--muted2)}
.pb-hint{font-size:.68rem;color:var(--muted);margin-top:.2rem}
.pb-reset{background:none;border:1px solid var(--border2);color:var(--muted2);border-radius:8px;padding:.35rem .8rem;font-size:.75rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.pb-reset:hover{border-color:var(--accent);color:var(--text)}
.nb{font-size:.82rem;color:var(--muted2);line-height:1.7;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem 1.2rem;margin-bottom:.75rem}
.nb strong{color:var(--text)}

/* FILTRES */
.filter-strip{padding:0 2rem .75rem;display:flex;flex-wrap:wrap;gap:.4rem;align-items:center}
.fbt{background:var(--surface);border:1px solid var(--border2);color:var(--muted2);border-radius:20px;padding:.22rem .65rem;font-size:.7rem;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbt.active{background:rgba(124,106,247,.15);border-color:var(--accent);color:var(--text)}
.fbt:not(.active){opacity:.4;text-decoration:line-through}
.filter-label{font-size:.7rem;color:var(--muted);margin-right:.2rem}
.b{display:inline-block;font-size:.58rem;font-weight:700;letter-spacing:.05em;padding:.12rem .4rem;border-radius:20px}
.bf{background:rgba(124,106,247,.2);color:#a78bfa;border:1px solid rgba(124,106,247,.3)}
.bs{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.ft{font-size:.56rem;background:rgba(255,165,0,.2);color:#ffa500;padding:1px 4px;border-radius:3px;font-weight:700}

/* ══════════════════════════════════════════
   GRILLE PRINCIPALE
══════════════════════════════════════════ */
.dc-grid-wrap{padding:0 2rem 4rem;overflow-x:auto}
.dc-grid{display:grid;grid-template-columns:2fr 1.4fr 1fr 1fr;gap:0;min-width:900px}

/* En-têtes colonnes sticky */
.col-head-row{display:contents}
.col-head{position:sticky;top:62px;z-index:100;background:var(--bg);padding:.5rem .6rem;border-bottom:2px solid;font-size:.75rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;text-align:center;backdrop-filter:blur(10px)}
/* Elseworlds = 3 sous-têtes */
.col-head.else{border-bottom-color:var(--c-else);color:var(--c-else);grid-column:1}
.col-head.av{border-bottom-color:var(--c-av);color:var(--c-av)}
.col-head.dceu{border-bottom-color:var(--c-dceu);color:var(--c-dceu)}
.col-head.dcu{border-bottom-color:var(--c-dcu);color:var(--c-dcu)}

/* Sous-têtes Elseworlds */
.else-subcols{display:grid;grid-template-columns:repeat(3,1fr);gap:0;grid-column:1}
.sub-head{font-size:.62rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;text-align:center;padding:.25rem .3rem;color:var(--muted);border-bottom:1px solid var(--border);background:var(--bg)}

/* Colonnes contenu */
.col-body{padding:.5rem .4rem;border-right:1px solid var(--border)}
.col-body:last-child{border-right:none}
/* Elseworlds a 3 sous-colonnes */
.else-body{display:grid;grid-template-columns:repeat(3,1fr);gap:0;grid-column:1;border-right:1px solid var(--border)}
.sub-col{padding:.5rem .35rem;border-right:1px solid var(--border)}
.sub-col:last-child{border-right:none}

/* ── ZONE AVANT CRISIS ── */
.zone-label{grid-column:1/-1;padding:.5rem 1rem;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.02);border-bottom:1px dashed var(--border);margin-bottom:.25rem}

/* ── CRISIS BANNER ── */
.crisis-banner{grid-column:1/-1;background:linear-gradient(135deg,rgba(255,215,0,.12),rgba(255,165,0,.08));border-top:2px solid rgba(255,215,0,.6);border-bottom:2px solid rgba(255,215,0,.6);padding:.85rem 1.5rem;display:flex;align-items:center;gap:1rem;margin:.5rem 0}
.crisis-icon{font-size:1.5rem;flex-shrink:0}
.crisis-text{flex:1}
.crisis-title{font-size:.95rem;font-weight:800;color:#ffd700;letter-spacing:.02em;margin-bottom:.2rem}
.crisis-sub{font-size:.75rem;color:rgba(255,215,0,.7);line-height:1.5}

/* ── ZONE APRÈS CRISIS ── */
.post-crisis-label{grid-column:1/-1;padding:.5rem 1rem;font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#ffd700;background:rgba(255,215,0,.04);border-bottom:1px dashed rgba(255,215,0,.3)}

/* ── GUIDE PARALLÈLE (bandeau intro colonne) ── */
.col-guide{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:6px;padding:.45rem .6rem;margin-bottom:.5rem;font-size:.68rem;color:var(--muted2);line-height:1.5;font-style:italic}
.col-guide strong{color:var(--text);font-style:normal}

/* ── ENTRÉES ── */
.dc-entry{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:4px;cursor:pointer;transition:border-color .15s,box-shadow .15s;overflow:hidden}
.dc-entry:hover{border-color:var(--border2);box-shadow:0 2px 10px rgba(0,0,0,.3)}
.dc-entry.open{border-color:var(--accent);box-shadow:0 3px 16px rgba(124,106,247,.2)}
.dc-entry.done{opacity:.5}
.dc-entry.imp{border-left:3px solid rgba(255,165,0,.7)}

.de-top{display:flex;align-items:flex-start;gap:.4rem;padding:.5rem .55rem;cursor:pointer}
.de-check{width:16px;height:16px;flex-shrink:0;border:1px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;transition:background .15s}
.de-check:hover{border-color:var(--accent)}
.dc-entry.done .de-check{background:var(--accent);border-color:var(--accent)}
.de-check-mark{font-size:.55rem;color:#fff;font-weight:700}
.de-thumb{width:40px;height:27px;border-radius:4px;overflow:hidden;flex-shrink:0;background:var(--surface2);position:relative}
.de-thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s}
.de-thumb img.loaded{opacity:1}
.de-thumb-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.8rem;color:var(--muted)}
.de-info{flex:1;min-width:0}
.de-title{font-size:.75rem;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.de-meta{display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;margin-top:2px}
.de-date{font-size:.62rem;color:var(--muted2)}
.de-dim{font-size:.58rem;color:var(--muted);background:rgba(255,255,255,.04);padding:0 3px;border-radius:2px}
.de-imp{font-size:.65rem}
.de-sub{padding:0 .55rem .45rem .55rem}
.de-sub-item{font-size:.67rem;color:var(--muted2);padding:.05rem 0 .05rem .5rem;line-height:1.4;border-left:1px solid var(--border)}
.de-expand{display:none;border-top:1px solid var(--border);padding:.65rem}
.dc-entry.open .de-expand{display:block}
.de-expand-inner{display:flex;gap:.65rem}
.de-poster{width:64px;flex-shrink:0;cursor:pointer;position:relative;border-radius:5px;overflow:hidden}
.de-poster img{width:100%;display:block;border-radius:5px}
.de-poster-ov{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;font-size:1rem}
.de-poster:hover .de-poster-ov{opacity:1}
.de-expand-info{flex:1;min-width:0}
.de-synopsis{font-size:.76rem;line-height:1.6;color:var(--muted2);margin-bottom:.4rem}
.de-expand-meta{display:flex;flex-wrap:wrap;gap:.25rem .6rem;font-size:.7rem;color:var(--muted2);margin-bottom:.4rem}
.de-expand-meta strong{color:var(--text)}
.de-trailer{display:inline-block;font-size:.7rem;color:var(--accent);text-decoration:none;margin-top:.2rem}
.de-trailer:hover{text-decoration:underline}
.expand-loading{font-size:.76rem;color:var(--muted)}

/* Entrée Crisis dans colonne AV */
.av-crisis{background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.4)!important;text-align:center}
.av-crisis .de-title{color:#ffd700;text-align:center}

/* Séparateur de section */
.section-sep{font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);padding:.35rem .2rem .1rem;opacity:.6;border-top:1px solid var(--border);margin-top:.3rem}
.section-sep:first-child{border-top:none;margin-top:0}

/* PM */
.pm{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.92);align-items:center;justify-content:center;cursor:pointer}
.pm.o{display:flex}
.pm img{max-width:90vw;max-height:90vh;border-radius:10px}
.pm-x{position:fixed;top:1rem;right:1.5rem;font-size:1.5rem;color:#fff;cursor:pointer;z-index:601}

/* MOBILE */
@media(max-width:800px){
  .dc-grid{grid-template-columns:1fr;min-width:unset}
  .else-body,.else-subcols{grid-template-columns:1fr}
  .col-head.else,.else-body,.zone-label,.crisis-banner,.post-crisis-label{grid-column:1}
  .dc-grid-wrap{padding:0 .75rem 3rem}
  nav{flex-wrap:wrap;height:auto;padding:.5rem 0;gap:.3rem}
  .logo{width:100%;justify-content:center}
  .nav-links{width:100%;justify-content:center;flex-wrap:wrap;gap:.35rem .7rem}
  .nav-links a{font-size:.78rem;white-space:nowrap}
  .nav-sp,.nav-maj,.pbn{display:none}
  .disc-btn{margin:0 auto .2rem}
  .page-header,.filter-strip{padding-left:1rem;padding-right:1rem}
}
</style>
</head>

  <button class="fbt active" data-col="dcu" onclick="toggleColFilter(this)" style="border-color:var(--c-dcu);color:var(--c-dcu)">DCU</button>

<div class="dc-grid-wrap">

<strong>Comment lire ce guide ?</strong> Les 4 colonnes représentent 4 univers différents. Vous pouvez les lire <strong>colonne par colonne</strong> (ex : tout l'Arrowverse d'une traite), ou <strong>en alternant</strong> entre Elseworlds et Arrowverse selon vos envies — mais terminez toujours un arc narratif avant de switcher. <strong>Crisis on Infinite Earths</strong> est le point de convergence : tout ce qui est au-dessus se passe dans des univers parallèles qui finiront par se croiser.<br><br>
Il manque des choses mais elles ne sont <strong>pas du tout</strong> importantes : tous les médias sortis avant 1989, les séries Flash (1990), Loïs & Clark, Lucifer, Krypton, Pennyworth, Wonder Woman (1976), Doom Patrol, le film Constantine (2005), Watchmen, les 2 films Joker, Green Lantern, Catwoman, presque tous les films d'animation, tous les comics et jeux-vidéo.<br><br>
Les deux chronologies principales se passent sur la <strong>Terre-Prime</strong> (Arrowverse) et la <strong>Terre-1</strong> (DCEU/DCU). Le Multivers DC fonctionne d'une manière particulière : deux personnages différents peuvent avoir la même tête (ex : le père de Flash 2014 et Flash 1990, Supergirl 1984 et la mère de Superman dans Smallville).`;

const detailCache={};
function getProgress(){try{return JSON.parse(localStorage.getItem('cg_dc')||'{}')}catch{return{}}}
function saveProgress(o){localStorage.setItem('cg_dc',JSON.stringify(o))}

function toggleEntry(id,ev){
  ev.stopPropagation();
  const p=getProgress();p[id]?delete p[id]:(p[id]=1);saveProgress(p);
  document.querySelectorAll(`[data-id="${id}"]`).forEach(el=>{
    el.classList.toggle('done',!!p[id]);
    el.querySelectorAll('.de-check-mark,.cv-cm').forEach(c=>c.textContent=p[id]?'✓':'');
    const ck=el.querySelector('.de-check');
    if(ck)ck.style.background=p[id]?'var(--accent)':'';
  });
  renderProgress();
}

function resetProgress(){
  if(!confirm('Réinitialiser ?'))return;
  localStorage.removeItem('cg_dc');
  document.querySelectorAll('.dc-entry.done').forEach(el=>{
    el.classList.remove('done');
    el.querySelectorAll('.de-check-mark').forEach(c=>c.textContent='');
    const ck=el.querySelector('.de-check');if(ck)ck.style.background='';
  });
  renderProgress();
}

function renderProgress(){
  const p=getProgress();
  const all=[...document.querySelectorAll('.dc-entry[data-id]')];
  const ids=new Set(all.map(el=>el.dataset.id));
  const total=ids.size,done=Object.keys(p).filter(k=>ids.has(k)).length;
  const pct=total?Math.round(done/total*100):0;
  const grad='linear-gradient(90deg,#1e90ff,var(--accent2))';
  const pb=document.getElementById('pb-fill');if(pb)pb.style.cssText='width:'+pct+'%;background:'+grad;
  const pc=document.getElementById('pb-counts');if(pc)pc.innerHTML='<strong>'+done+'</strong> / '+total+' vus · <strong>'+pct+'%</strong>';
  const pbn=document.getElementById('pbn');
  if(pbn){pbn.classList.toggle('show',total>0);document.getElementById('pbn-label').textContent=done+'/'+total;document.getElementById('pbn-fill').style.cssText='width:'+pct+'%;background:'+grad}
}

function buildEntry(e,colId){
  const p=getProgress();const isDone=!!p[e.id];
  const isImp=e.level==='imp';
  let borderL='';
  if(colId==='arrowverse'){const c=AV_C[e.title]||'#22c55e';borderL=`border-left:3px solid ${c};`}
  else if(colId==='elseworlds')borderL='border-left:3px solid var(--c-else);';
  else if(colId==='dceu')borderL='border-left:3px solid var(--c-dceu);';
  else if(colId==='dcu')borderL='border-left:3px solid var(--c-dcu);';
  const isCrisis=e.id==='av-crisis';
  if(isCrisis)borderL='border:1px solid rgba(255,215,0,.5)!important;background:rgba(255,215,0,.06);';
  const tags=e.tags||[];
  const sub=e.subitems?.length?e.subitems.map(s=>`<div class="de-sub-item">${s}</div>`).join(''):'';
  return `<div class="dc-entry${isDone?' done':''}${isImp?' imp':''}" data-id="${e.id}" data-type="${e.type}" data-level="${e.level}" data-tmdb="${e.tmdb||'0'}" data-media="${e.media||'tv'}" style="${borderL}">
  <div class="de-top" onclick="toggleExpand(this.closest('.dc-entry'),event)">
    <div class="de-check" onclick="toggleEntry('${e.id}',event)"><span class="de-check-mark">${isDone?'✓':''}</span></div>
    <div class="de-thumb"><div class="de-thumb-icon">${e.type==='film'?'🎬':'📺'}</div><img alt="" loading="lazy"/></div>
    <div class="de-info">
      <div class="de-title">${tags.includes('flashback')?'<span class="ft" style="margin-right:3px">FLASHBACK</span>':''}${isImp?'🚨 ':''}${e.title}</div>
      <div class="de-meta">
        <span class="de-date">${e.date||'—'}</span>
        ${e.dim?`<span class="de-dim">${e.dim}</span>`:''}
        <span class="b ${e.type==='film'?'bf':'bs'}">${e.type==='film'?'FILM':'SÉRIE'}</span>
      </div>
    </div>
  </div>
  ${sub?`<div class="de-sub">${sub}</div>`:''}
  ${e.note?`<div style="padding:0 .55rem .4rem;font-size:.67rem;color:var(--muted2);font-style:italic">${e.note}</div>`:''}
  <div class="de-expand" onclick="event.stopPropagation()"></div>
</div>`;
}

async function toggleExpand(el,ev){
  if(ev.target.closest('.de-check'))return;
  const wasOpen=el.classList.contains('open');
  document.querySelectorAll('.dc-entry.open').forEach(x=>x.classList.remove('open'));
  if(wasOpen)return;
  el.classList.add('open');
  const panel=el.querySelector('.de-expand');
  if(panel.dataset.loaded)return;
  panel.dataset.loaded='1';
  const tmdb=el.dataset.tmdb,media=el.dataset.media;
  if(!tmdb||tmdb==='0'){panel.innerHTML='<div class="expand-loading" style="padding:.5rem">Pas d\'informations TMDB.</div>';return}
  panel.innerHTML='<div class="expand-loading" style="padding:.5rem">Chargement…</div>';
  const type=media==='movie'?'movie':'tv';const k=type+tmdb;
  let d=detailCache[k];
  if(!d){
    try{
      const rFr=await fetch(`https://api.themoviedb.org/3/${type}/${tmdb}?api_key=${TMDB_KEY}&language=fr-FR&append_to_response=videos`);
      d=await rFr.json();
      if(!d.videos?.results?.find(v=>v.type==='Trailer'&&v.site==='YouTube')){
        const rEn=await fetch(`https://api.themoviedb.org/3/${type}/${tmdb}/videos?api_key=${TMDB_KEY}&language=en-US`);
        const ev2=await rEn.json();if(ev2.results)d.videos={results:[...((d.videos?.results)||[]),...ev2.results]};
      }
      detailCache[k]=d;
    }catch{panel.innerHTML='<div class="expand-loading" style="padding:.5rem">Erreur.</div>';return}
  }
  const poster=d.poster_path?IMG+'w300'+d.poster_path:null;
  const synopsis=d.overview||'Pas de synopsis.';
  const trailer=(d.videos?.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube');
  const year=(d.release_date||d.first_air_date||'').substring(0,4);
  const rating=d.vote_average?d.vote_average.toFixed(1):'';
  let meta='';
  if(year)meta+=`<span><strong>Année</strong> ${year}</span>`;
  if(rating)meta+=`<span><strong>Note</strong> ⭐ ${rating}/10</span>`;
  if(d.runtime)meta+=`<span><strong>Durée</strong> ${d.runtime} min</span>`;
  panel.innerHTML=`<div class="de-expand-inner">
    ${poster?`<div class="de-poster" onclick="openPMurl('${IMG}w500${d.poster_path}')"><img src="${poster}" loading="lazy"/><div class="de-poster-ov">🔍</div></div>`:''}
    <div class="de-expand-info">
      <div class="de-synopsis">${synopsis}</div>
      ${meta?`<div class="de-expand-meta">${meta}</div>`:''}
      ${trailer?`<a class="de-trailer" href="https://www.youtube.com/watch?v=${trailer.key}" target="_blank" rel="noopener">▶ Bande-annonce</a>`:''}
    </div>
  </div>`;
}

function openPMurl(url){document.getElementById('pmi').src=url;document.getElementById('pm').classList.add('o')}
function closePM(){document.getElementById('pm').classList.remove('o')}

// ── RENDU GRILLE ─────────────────────────────────────
function buildGrid(){
  const g=document.getElementById('dc-grid');
  let h='';

  // ── En-têtes colonnes ──
  h+=`<div class="col-head else" style="grid-column:1">Elseworlds</div>`;
  h+=`<div class="col-head av">Arrowverse</div>`;
  h+=`<div class="col-head dceu">DCEU</div>`;
  h+=`<div class="col-head dcu">DCU</div>`;

  // ── Sous-têtes Elseworlds ──
  h+=`<div class="else-subcols" style="position:sticky;top:calc(62px + 34px);z-index:99;background:var(--bg)">
    <div class="sub-head" style="color:var(--c-else)">Superman</div>
    <div class="sub-head" style="color:var(--c-else)">Batman</div>
    <div class="sub-head" style="color:var(--c-else)">Autres</div>
  </div>`;
  h+=`<div></div><div></div><div></div>`; // spacers pour grid

  // ── ZONE AVANT CRISIS ──
  h+=`<div class="zone-label">▼ Univers parallèles — lire colonne par colonne ou en alternant, finissez chaque arc narratif avant de switcher</div>`;

  // ── Contenu avant Crisis ──
  h+=`<div class="else-body" data-col="elseworlds">
    <div class="sub-col" data-sub="superman">
      <div class="col-guide">Origines de Superman dans différents univers — regardez <strong>avant ou pendant</strong> l'Arrowverse à votre convenance</div>
      ${BEFORE_CRISIS.elseworlds_superman.map(e=>buildEntry(e,'elseworlds')).join('')}
    </div>
    <div class="sub-col" data-sub="batman">
      <div class="col-guide">Origines de Batman dans différents univers — regardez <strong>avant ou pendant</strong> l'Arrowverse à votre convenance</div>
      ${BEFORE_CRISIS.elseworlds_batman.map(e=>buildEntry(e,'elseworlds')).join('')}
    </div>
    <div class="sub-col" data-sub="autres">
      <div class="col-guide">À regarder <strong>en parallèle</strong> de l'Arrowverse — ces univers participent à Crisis</div>
      ${BEFORE_CRISIS.elseworlds_autres.map(e=>buildEntry(e,'elseworlds')).join('')}
    </div>
  </div>`;

  h+=`<div class="col-body" data-col="arrowverse">
    ${BEFORE_CRISIS.arrowverse.map(e=>buildEntry(e,'arrowverse')).join('')}
  </div>`;

  h+=`<div class="col-body" data-col="dceu">
    <div class="col-guide">Univers indépendant de l'Arrowverse — regardez <strong>en parallèle</strong> quand vous voulez</div>
    ${BEFORE_CRISIS.dceu.map(e=>buildEntry(e,'dceu')).join('')}
  </div>`;

  h+=`<div class="col-body" data-col="dcu"></div>`;

  // ── CRISIS BANNER ──
  h+=`<div class="crisis-banner">
    <div class="crisis-icon">⚡</div>
    <div class="crisis-text">
      <div class="crisis-title">Crisis on Infinite Earths</div>
      <div class="crisis-sub">Arrow S8 E8 · The Flash S6 E9 · Supergirl S5 E9 · Batwoman S1 E9 · Legends of Tomorrow S5 E1<br>
      Le point de convergence du Multivers — à partir d'ici, Terre-Prime unifie l'Arrowverse. Titans et Stargirl y participent aussi.</div>
    </div>
  </div>`;

  // ── ZONE APRÈS CRISIS ──
  h+=`<div class="post-crisis-label">▼ Post-Crisis — Terre-Prime unifiée pour l'Arrowverse · Le DCEU continue en parallèle · Le DCU commence</div>`;

  // ── Contenu après Crisis ──
  h+=`<div class="else-body" data-col="elseworlds">
    <div class="sub-col" data-sub="superman">
      ${AFTER_CRISIS.elseworlds_superman.map(e=>buildEntry(e,'elseworlds')).join('') || '<div style="padding:.5rem;font-size:.68rem;color:var(--muted)">—</div>'}
    </div>
    <div class="sub-col" data-sub="batman">
      ${AFTER_CRISIS.elseworlds_batman.map(e=>buildEntry(e,'elseworlds')).join('')}
    </div>
    <div class="sub-col" data-sub="autres">
      ${AFTER_CRISIS.elseworlds_autres.map(e=>buildEntry(e,'elseworlds')).join('')}
    </div>
  </div>`;

  h+=`<div class="col-body" data-col="arrowverse">
    ${AFTER_CRISIS.arrowverse.map(e=>buildEntry(e,'arrowverse')).join('')}
  </div>`;

  h+=`<div class="col-body" data-col="dceu">
    ${AFTER_CRISIS.dceu.map(e=>buildEntry(e,'dceu')).join('')}
  </div>`;

  h+=`<div class="col-body" data-col="dcu">
    <div class="col-guide">Le nouveau DCU de James Gunn — univers rebooté connecté au DCEU via The Flash (2023)</div>
    ${AFTER_CRISIS.dcu.map(e=>buildEntry(e,'dcu')).join('')}
  </div>`;

  g.innerHTML=h;
  loadPosters();
  renderProgress();
}

// Filtres colonnes
function toggleColFilter(btn){
  btn.classList.toggle('active');
  const col=btn.dataset.col;
  const visible=btn.classList.contains('active');
  document.querySelectorAll(`[data-col="${col}"]`).forEach(el=>{el.style.display=visible?'':'none'});
  // Elseworlds = gère aussi les sous-cols
  if(col==='elseworlds'){
    document.querySelectorAll('.else-subcols,.col-head.else').forEach(el=>{el.style.display=visible?'':'none'});
  }
}

function applyFilters(){
  const showImp=document.getElementById('fbt-imp').classList.contains('active');
  const showBonus=document.getElementById('fbt-bonus').classList.contains('active');
  document.querySelectorAll('.dc-entry').forEach(el=>{
    const lvl=el.dataset.level;
    const ok=(lvl==='imp'&&showImp)||(lvl==='bonus'&&showBonus);
    el.style.display=ok?'':'none';
  });
}

// Posters TMDB
async function loadPosters(){
  const seen=new Set();
  const entries=[...document.querySelectorAll('.dc-entry[data-tmdb]')];
  for(let i=0;i<entries.length;i+=10){
    await Promise.all(entries.slice(i,i+10).map(async el=>{
      const tmdb=el.dataset.tmdb,media=el.dataset.media;
      if(!tmdb||tmdb==='0')return;
      const type=media==='movie'?'movie':'tv';const k=type+tmdb;
      if(seen.has(k)){
        // Appliquer depuis cache
        const d=detailCache[k];
        if(d){const path=d.backdrop_path||d.poster_path;if(path)applyThumb(el,IMG+'w92'+path);}
        return;
      }
      seen.add(k);
      try{
        const r=await fetch(`https://api.themoviedb.org/3/${type}/${tmdb}?api_key=${TMDB_KEY}&language=fr-FR`);
        const d=await r.json();detailCache[k]=d;
        const path=d.backdrop_path||d.poster_path;
        if(path){
          document.querySelectorAll(`.dc-entry[data-tmdb="${tmdb}"][data-media="${media}"]`).forEach(e2=>applyThumb(e2,IMG+'w92'+path));
        }
      }catch{}
    }));
    await new Promise(r=>setTimeout(r,60));
  }
}

function applyThumb(el,src){
  const img=el.querySelector('.de-thumb img');
  const icon=el.querySelector('.de-thumb-icon');
  if(img&&!img.classList.contains('loaded')){
    img.src=src;img.onload=()=>{img.classList.add('loaded');if(icon)icon.style.display='none'};
  }
}

buildGrid();
